<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Twitch SaaS</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Dashboard</h1>
      <p id="status">Carregando...</p>

      <section>
        <h2>Comandos</h2>
        <form id="command-form">
          <input id="trigger" placeholder="!discord" required />
          <input id="response" placeholder="Entre no Discord" required />
          <button type="submit">Salvar comando</button>
        </form>
        <ul id="commands"></ul>
      </section>

      <section>
        <h2>Clips sugeridos</h2>
        <ul id="clips"></ul>
      </section>

      <section>
        <h2>CRM (top comunidade)</h2>
        <ul id="viewers"></ul>
      </section>

      <section>
        <h2>Monetização</h2>
        <button id="checkout">Assinar plano Pro</button>
      </section>
    </main>

    <script type="module" src="/app/dashboard.js"></script>
  </body>
</html>
